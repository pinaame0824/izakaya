<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご予約 | 篝火 - KAGARIBI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .reservation-content {
            max-width: 700px;
            margin: 160px auto 100px;
            background: white;
            padding: 60px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-family: var(--font-serif);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 2px;
            font-family: var(--font-main);
            font-size: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-submit {
            margin-top: 40px;
            text-align: center;
        }

        .form-submit .btn {
            width: 100%;
            padding: 20px;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .reservation-content {
                padding: 30px;
                margin: 120px 20px 60px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="bg-paper">
    <header class="scrolled">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">篝火<span>KAGARIBI</span></a>
            </div>
            <nav class="desktop-nav">
                <ul>
                    <li><a href="index.html#concept">こだわり</a></li>
                    <li><a href="index.html#menu">お品書き</a></li>
                    <li><a href="index.html#gallery">空間</a></li>
                    <li><a href="index.html#access">アクセス</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="reservation-content">
            <div class="text-center mb-40">
                <span class="sub-title">RESERVATION</span>
                <h1 style="font-size: 32px; margin-bottom: 20px;">ご予約フォーム</h1>
                <p>以下のフォームより必要事項をご入力ください。</p>
            </div>

            <form id="res-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">ご来店日</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">ご来店時間</label>
                        <select id="time" required>
                            <option value="">選択してください</option>
                            <option>17:00</option>
                            <option>17:30</option>
                            <option>18:00</option>
                            <option>18:30</option>
                            <option>19:00</option>
                            <option>19:30</option>
                            <option>20:00</option>
                            <option>20:30</option>
                            <option>21:00</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="people">人数</label>
                        <select id="people" required>
                            <option value="">選択してください</option>
                            <option>1名</option>
                            <option>2名</option>
                            <option>3名</option>
                            <option>4名</option>
                            <option>5名</option>
                            <option>6名以上（要相談）</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="course">コース選択</label>
                        <select id="course">
                            <option>席のみ予約</option>
                            <option>【一番人気】篝火堪能コース (¥6,000)</option>
                            <option>旬の鮮魚と炭火焼きコース (¥8,000)</option>
                            <option>極上・四季の贅沢コース (¥12,000)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" placeholder="山田 太郎" required>
                </div>

                <div class="form-group">
                    <label for="tel">電話番号</label>
                    <input type="tel" id="tel" placeholder="090-0000-0000" required>
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="message">ご要望（アレルギー等）</label>
                    <textarea id="message" rows="4" placeholder="アレルギーなどございましたらご記入ください。"></textarea>
                </div>

                <div class="form-submit">
                    <button type="submit" class="btn btn-gold">予約を確定する</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 KAGARIBI. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('res-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('ご予約ありがとうございます。内容を確認後、スタッフよりお電話またはメールにてご連絡差し上げます。');
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
